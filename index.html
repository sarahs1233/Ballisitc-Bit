<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballistic Bit - פתרונות תוכנה וחומרי גלם מתקדמים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rubik', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#031524',
                            primary: '#1b9dd9',
                            blue: '#056bb3',
                            accent: '#e87525',
                            surface: '#062b47'
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --brand-light-blue: #1b9dd9;
            --brand-blue: #056bb3;
            --brand-orange: #e87525;
            --brand-navy: #062b47;
            --brand-black: #000000;
            --brand-white: #ffffff;
            --surface: #062b47;
            --border: rgba(27, 157, 217, 0.2);
            --text-primary: #ffffff;
            --text-muted: #a8c7e0;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Rubik', sans-serif; overflow-x: hidden; position: relative; min-height: 100vh; background-color: #031524; }

        /* Noise Texture Background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #031524; }
        ::-webkit-scrollbar-thumb { background: var(--brand-orange); border-radius: 3px; }

        .gradient-text {
            background: linear-gradient(90deg, var(--brand-light-blue), var(--brand-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero-bg {
            background-image: radial-gradient(circle at 20% 50%, rgba(27, 157, 217, 0.15) 0%, transparent 25%),
                              radial-gradient(circle at 80% 80%, rgba(232, 117, 37, 0.15) 0%, transparent 25%);
        }

        /* ── INTERACTIVE MATERIAL CARDS ── */
        .mat-card {
            background: rgba(6, 43, 71, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all .4s cubic-bezier(.4,0,.2,1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: right;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        .mat-card::before {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--brand-light-blue), var(--brand-orange));
            opacity: 0; transition: opacity .4s;
            z-index: 10;
        }
        .mat-card:hover {
            border-color: rgba(232, 117, 37, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(232, 117, 37, 0.15);
        }
        .mat-card:hover::before { opacity: 1; }

        .card-body { padding: 1.8rem; flex-grow: 1; display: flex; flex-direction: column; }
        .card-label {
            display: inline-block;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
            color: var(--brand-light-blue); text-transform: uppercase;
            margin-bottom: 0.6rem;
        }
        .card-title {
            font-size: 1.2rem; font-weight: 700;
            color: var(--text-primary); margin-bottom: 0.8rem;
        }
        .card-desc {
            font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; font-weight: 300;
        }

        /* ── LIGHTBOX ── */
        .lightbox {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity .4s ease;
            padding: 2rem;
            direction: rtl;
        }
        .lightbox.open { opacity: 1; pointer-events: all; }
        .lb-inner {
            position: relative;
            max-width: 900px; width: 100%;
            background: var(--surface);
            border: 1px solid rgba(27, 157, 217, 0.2);
            border-radius: 20px;
            overflow: hidden;
            transform: scale(.95) translateY(20px);
            transition: all .4s cubic-bezier(.4,0,.2,1);
            display: grid; grid-template-columns: 1fr 1.2fr;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .lightbox.open .lb-inner { transform: scale(1) translateY(0); }
        
        .lb-img {
            width: 100%; height: 100%; min-height: 400px;
            object-fit: cover; display: block;
        }
        .lb-info {
            padding: 3rem 2.5rem;
            display: flex; flex-direction: column; justify-content: center;
            background: var(--surface);
        }
        .lb-label {
            font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
            color: var(--brand-orange); text-transform: uppercase; margin-bottom: 0.8rem;
        }
        .lb-title {
            font-size: 1.8rem; font-weight: 800;
            color: var(--text-primary); line-height: 1.2;
            margin-bottom: 1.2rem;
        }
        .lb-desc {
            color: var(--text-muted); line-height: 1.8; font-size: 1rem;
            margin-bottom: 2rem;
        }
        .lb-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .lb-tag {
            padding: 0.4rem 1rem; border-radius: 100px;
            border: 1px solid var(--brand-blue);
            font-size: 0.8rem; color: var(--brand-light-blue);
            background: rgba(5, 107, 179, 0.1);
            font-weight: 500;
        }
        
        .lb-close {
            position: absolute; top: 1.2rem; right: 1.2rem;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .2s;
            z-index: 10;
        }
        .lb-close:hover { background: var(--brand-orange); border-color: var(--brand-orange); transform: rotate(90deg); }
        
        .lb-nav {
            position: absolute; top: 50%;
            transform: translateY(-50%);
            width: 46px; height: 46px; border-radius: 50%;
            background: var(--brand-blue);
            border: 2px solid var(--brand-navy);
            color: white; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all .25s;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .lb-nav:hover { background: var(--brand-orange); transform: translateY(-50%) scale(1.1); border-color: var(--brand-orange); }
        .lb-prev { right: -1.5rem; }
        .lb-next { left: -1.5rem; }

        @media(max-width: 850px) {
            .lb-inner { grid-template-columns: 1fr; }
            .lb-img { height: 280px; min-height: auto;}
            .lb-info { padding: 2rem; }
            .lb-title { font-size: 1.4rem; }
            .lb-prev { right: 1rem; }
            .lb-next { left: 1rem; }
        }

        /* ── HERO SLIDER ── */
        .hero-slider {
            position: relative;
            width: 100%; max-width: 480px;
            aspect-ratio: 1 / 1;
        }
        .hero-slider::before {
            content: '';
            position: absolute; inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--brand-light-blue), var(--brand-orange));
            opacity: 0.25;
            filter: blur(18px);
            z-index: 0;
        }
        .slide-track {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(27,157,217,0.25);
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            z-index: 1;
        }
        .slide {
            position: absolute; inset: 0;
            opacity: 0;
            transition: opacity 0.7s cubic-bezier(.4,0,.2,1),
                        transform 0.7s cubic-bezier(.4,0,.2,1);
            transform: scale(1.04);
        }
        .slide.active {
            opacity: 1;
            transform: scale(1);
        }
        .slide img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .slide-caption {
            display: none !important;
        }
        .slide-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 2;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(6,43,71,.7);
            border: 1px solid rgba(27,157,217,.35);
            color: #fff; font-size: 1.1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background .2s, border-color .2s, transform .2s;
            backdrop-filter: blur(4px);
        }
        .slide-arrow:hover {
            background: var(--brand-orange);
            border-color: var(--brand-orange);
            transform: translateY(-50%) scale(1.1);
        }
        .slide-arrow.prev { right: -16px; }
        .slide-arrow.next { left: -16px; }
        .slide-dots {
            position: absolute; bottom: -28px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 2;
        }
        .slide-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,.3);
            cursor: pointer;
            transition: background .3s, transform .3s;
        }
        .slide-dot.active {
            background: var(--brand-orange);
            transform: scale(1.4);
        }
    </style>
</head>
